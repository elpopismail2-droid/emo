<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>💛</title>
<style>
body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
min-height:100vh;
overflow-y:auto;
background:linear-gradient(180deg,#0f2027,#203a43,#2c5364);
}
.hearts{position:absolute;width:100%;height:100%;z-index:-1;}
.heart{position:absolute;font-size:20px;animation:float 6s linear infinite;}
@keyframes float{0%{transform:translateY(100vh);}100%{transform:translateY(-100px);}}

.box{
background:rgba(0,0,0,0.6);
padding:20px;
margin:50px auto;
border-radius:15px;
width:90%;
max-width:400px;
}

#heart{font-size:100px;cursor:pointer;animation:pulse 2s infinite;}
@keyframes pulse{50%{transform:scale(1.2);}}

#msg{
display:none;
background:white;
color:black;
padding:15px;
border-radius:10px;
margin-top:20px;
white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="box" id="welcome">
<h2>كل سنه وانتي طيبه يا ميس ايمان💛💚💚💚💚💚💚</h2>
<button onclick="goLogin()">دخول</button>
</div>

<div class="box" id="login" style="display:none;">
<h3>الباسورد</h3>
<input id="pass">
<button onclick="check()">دخول</button>
</div>

<div class="box" id="main" style="display:none;">
<div id="heart">💛</div>
<div id="msg"></div>
<audio id="audio" loop>
<source src="ssstik.io_1773931929844.mp3">
</audio>
</div>

<script>
const hearts=document.getElementById("hearts");
for(let i=0;i<20;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💚";
h.style.left=Math.random()*100+"%";
hearts.appendChild(h);
}

function goLogin(){
document.getElementById("welcome").style.display="none";
document.getElementById("login").style.display="block";
}

function check(){
if(document.getElementById("pass").value==="miss eman1"){
document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";
}else alert("الباسورد غلط");
}

const text=`كل سنه ونتي طيبه يا ميس ايمان وسنه سعيده عليكي وكل سنه ونتي طيبه 
وبمناسبه ان دا اخر سيشن 
احب اقولك كل سنه ونتي طيبه 
هتوحشينا والله يا ميس🥺 We will miss you 
كفايا ضحكتك وهزار معانا العثل🙂👏
بس كدا باي🙂👏`;

let i=0;
document.getElementById("heart").onclick=()=>{
document.getElementById("msg").style.display="block";
document.getElementById("audio").play();
function write(){
if(i<text.length){
document.getElementById("msg").innerHTML+=text[i];
i++;
setTimeout(write,35);
}}
write();
};
</script>

</body>
                                  </html>
